    <!-- LocationRoute Polyfill for clean path-based routing (without # URLs) -->
    <script type="text/javascript">
      window.LocationRoute = {
        get hash() {
          let p = window.location.pathname;
          if (p === "/") {
            let h = window.location.hash;
            if (h && h !== "#" && h !== "#sakums" && h !== "#home") {
              return "#sakums" + h;
            }
            return "#sakums";
          }
          let route = "#" + p.substring(1);
          let h = window.location.hash;
          if (h && h !== "#") {
            route += h;
          }
          return route;
        },
        set hash(val) {
          if (!val) {
            window.history.pushState(null, "", "/");
            window.dispatchEvent(new Event("hashchange"));
            return;
          }
          let parts = val.split("#");
          let mainRoute = parts[1] || "sakums";
          let anchor = parts[2] ? "#" + parts[2] : "";
          
          let path = "/";
          if (mainRoute !== "sakums" && mainRoute !== "home") {
            path = "/" + mainRoute;
          }
          
          window.history.pushState(null, "", path + anchor);
          window.dispatchEvent(new Event("hashchange"));
        }
      };
    </script>
    
    <!-- Image Optimization & CDN Delivery Engine -->
    <script type="text/javascript">
      window.getOptimizedImageUrl = function(url, width, quality) {
        if (!url) return "";
        if (url.startsWith("data:")) return url;
        
        quality = quality || 80;
        
        // For local WebP images, if a thumbnail size is requested, use our pre-built -thumb.webp file
        if (url.indexOf("/images/") === 0) {
          if (width <= 450 && url.indexOf(".webp") !== -1 && url.indexOf("-thumb.webp") === -1) {
            return url.replace(".webp", "-thumb.webp");
          }
          return url;
        }
        
        // On production Netlify, route remote R2 and other images through Netlify Image CDN
        var isNetlify = typeof window !== "undefined" && 
                        window.location.hostname !== "localhost" && 
                        window.location.hostname !== "127.0.0.1" && 
                        window.location.hostname.indexOf("ais-dev") === -1 && 
                        window.location.hostname.indexOf("ais-pre") === -1;
                        
        if (isNetlify) {
          return "/.netlify/images?url=" + encodeURIComponent(url) + "&w=" + width + "&q=" + quality;
        }
        
        return url;
      };
    </script>

    <script type="text/javascript">
      // Global smooth scroll helper with custom duration and easing
      function smoothScrollTo(element, target, duration) {
        const start = element.scrollLeft;
        const change = target - start;
        const startTime = performance.now();
        
        function animateScroll(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          // Ease-out quartic: premium, incredibly fluid deceleration
          const ease = 1 - Math.pow(1 - progress, 4);
          
          element.scrollLeft = start + change * ease;
          
          if (progress < 1) {
            window.requestAnimationFrame(animateScroll);
          } else {
            // Force final absolute precision alignment
            element.scrollLeft = target;
          }
        }
        
        window.requestAnimationFrame(animateScroll);
      }

      // Helper to calculate exact scroll position to center a specific card
      // Uses offsetLeft and offsetWidth to get absolute, unscaled layout positions
      // that are 100% immune to transform scale shifts or transitions.
      function getCenteredScrollLeft(element, card) {
        const cardCenter = card.offsetLeft + card.offsetWidth / 2;
        const containerCenter = element.clientWidth / 2;
        return Math.round(cardCenter - containerCenter);
      }

      // Global navigation functions for precise step-by-step scrolling
      window.scrollPortfolioPrev = function() {
        const el = document.getElementById("portfolio-categories-container");
        if (!el || !el.children.length) return;
        
        const cards = Array.from(el.querySelectorAll('.category-carousel-card'));
        if (!cards.length) return;
        
        const currentScroll = el.scrollLeft;
        
        let activeIndex = 0;
        let minDistance = Infinity;
        
        // Find the card that is currently closest to the center using stable layout coordinates
        cards.forEach((card, idx) => {
          const targetScrollForCard = getCenteredScrollLeft(el, card);
          const distance = Math.abs(currentScroll - targetScrollForCard);
          if (distance < minDistance) {
            minDistance = distance;
            activeIndex = idx;
          }
        });
        
        const targetIndex = Math.max(0, activeIndex - 1);
        const targetScroll = getCenteredScrollLeft(el, cards[targetIndex]);
        smoothScrollTo(el, targetScroll, 900); // 900ms is perfectly tuned (twice as fast as 1800ms)
      };

      window.scrollPortfolioNext = function() {
        const el = document.getElementById("portfolio-categories-container");
        if (!el || !el.children.length) return;
        
        const cards = Array.from(el.querySelectorAll('.category-carousel-card'));
        if (!cards.length) return;
        
        const currentScroll = el.scrollLeft;
        
        let activeIndex = 0;
        let minDistance = Infinity;
        
        // Find the card that is currently closest to the center using stable layout coordinates
        cards.forEach((card, idx) => {
          const targetScrollForCard = getCenteredScrollLeft(el, card);
          const distance = Math.abs(currentScroll - targetScrollForCard);
          if (distance < minDistance) {
            minDistance = distance;
            activeIndex = idx;
          }
        });
        
        const targetIndex = Math.min(cards.length - 1, activeIndex + 1);
        const targetScroll = getCenteredScrollLeft(el, cards[targetIndex]);
        smoothScrollTo(el, targetScroll, 900); // 900ms is perfectly tuned (twice as fast as 1800ms)
      };

      // Run the initial local storage sanitation check to clear stale cache
      try {
        const currentVersion = "avangart-projects-list-v25";
        const orderKey = "avangart-placeholders-order";
        
        // Remove old caches so that the app loads the correct configuration
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (key && (key.startsWith("avangart-projects-list-") && key !== currentVersion)) {
            console.warn("Purging outdated local storage key:", key);
            localStorage.removeItem(key);
            localStorage.removeItem(orderKey);
          }
        }
      } catch (e) {
        console.error(e);
      }

      // Infinite scroll loop logic for categories
      (function() {
        let isInitialized = false;

        function initInfiniteScroll() {
          const el = document.getElementById("portfolio-categories-container");
          if (!el || el.children.length < 55) return;

          if (el.dataset.infiniteInitialized === "true") return;
          el.dataset.infiniteInitialized = "true";

          console.log("Setting up infinite scroll loop for portfolio-categories-container...");

          const updateWidths = () => {
            const first = el.children[0];
            const second = el.children[1];
            if (!first || !second) return;
            const gap = second.getBoundingClientRect().left - first.getBoundingClientRect().right;
            const cardWidth = first.getBoundingClientRect().width;
            const itemWidth = cardWidth + (gap > 0 ? gap : 20);
            // 11 unique categories, so 1 set is 11 items
            const setWidth = itemWidth * 11;
            el.dataset.setWidth = setWidth;
          };

          updateWidths();

          const io = new ResizeObserver(() => {
            updateWidths();
          });
          io.observe(el);

          // Scroll to the start of the 3rd set (copy index 2 out of indices 0..4)
          setTimeout(() => {
            const sW = parseFloat(el.dataset.setWidth || "0");
            if (sW > 0) {
              el.scrollLeft = sW * 2;
            }
          }, 100);

          let scrollTimeout;
          const doInfiniteAdjustment = () => {
            const sW = parseFloat(el.dataset.setWidth || "0");
