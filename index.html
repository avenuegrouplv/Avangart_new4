<!DOCTYPE html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo_clean_v4.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVANGART | Dizaina Mēbeļu Portfolio</title>
    <!-- Link CSS -->
    <link rel="stylesheet" crossorigin href="/assets/index-KXNzc3bB.css" />
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-none::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-none {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Carousel Cards Styles - exact size matching and 5 desktop / 1 mobile alignment */
      .category-carousel-card {
        scroll-snap-align: center !important;
        flex-shrink: 0 !important;
        margin: 0 !important;
        width: 224px !important;
        min-width: 224px !important;
        max-width: 224px !important;
      }
      
      #portfolio-categories-container {
        display: flex !important;
        overflow-x: auto !important;
        scroll-behavior: auto !important;
        scroll-snap-type: x mandatory !important;
        gap: 20px !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
        width: 224px !important;
        max-width: 224px !important;
        margin-left: auto !important;
        margin-right: auto !important;
      }
      
      @media (min-width: 1024px) {
        .category-carousel-card {
          scroll-snap-align: start !important;
          width: calc((100% - 80px) / 5) !important;
          min-width: calc((100% - 80px) / 5) !important;
          max-width: calc((100% - 80px) / 5) !important;
        }
        #portfolio-categories-container {
          width: 100% !important;
          max-width: 1200px !important;
        }
      }
    
      /* Generous gaps between galleries (both horizontally and vertically) */
      .custom-gallery-grid {
        display: grid !important;
        grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
        gap: 3.44rem !important; /* Mobile gap */
      }
      @media (min-width: 640px) {
        .custom-gallery-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
          gap: 3.825rem !important; /* Tablet/Desktop gap */
        }
      }
      @media (min-width: 1024px) {
        .custom-gallery-grid {
          gap: 4.97rem !important; /* Large desktop gap */
        }
      }
    
    </style>
  </head>
  <body class="bg-white text-zinc-900 font-sans antialiased">
    <div id="root"></div>
    <script type="text/javascript">
      // Global navigation functions for precise step-by-step scrolling
      window.scrollPortfolioPrev = function() {
        const el = document.getElementById("portfolio-categories-container");
        if (!el || !el.children.length) return;
        const card = el.children[0];
        const cardWidth = card.getBoundingClientRect().width;
        const gap = 20;
        const itemWidth = cardWidth + gap;
        const currentScroll = el.scrollLeft;
        const targetScroll = Math.round(currentScroll / itemWidth) * itemWidth - itemWidth;
        el.scrollTo({ left: targetScroll, behavior: "smooth" });
      };

      window.scrollPortfolioNext = function() {
        const el = document.getElementById("portfolio-categories-container");
        if (!el || !el.children.length) return;
        const card = el.children[0];
        const cardWidth = card.getBoundingClientRect().width;
        const gap = 20;
        const itemWidth = cardWidth + gap;
        const currentScroll = el.scrollLeft;
        const targetScroll = Math.round(currentScroll / itemWidth) * itemWidth + itemWidth;
        el.scrollTo({ left: targetScroll, behavior: "smooth" });
      };

      // Run the initial local storage sanitation check to clear stale cache
      try {
        const currentVersion = "avangart-projects-list-v22";
        const orderKey = "avangart-placeholders-order";
        
        // Remove old caches so that the app loads the correct configuration
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (key && (key.startsWith("avangart-projects-list-") && key !== currentVersion)) {
            console.warn("Purging outdated local storage key:", key);
            localStorage.removeItem(key);
            localStorage.removeItem(orderKey);
          }
        }
      } catch (e) {
        console.error(e);
      }

      // Infinite scroll loop logic for categories
      (function() {
        let isInitialized = false;

        function initInfiniteScroll() {
          const el = document.getElementById("portfolio-categories-container");
          if (!el || el.children.length < 55) return;

          if (el.dataset.infiniteInitialized === "true") return;
          el.dataset.infiniteInitialized = "true";

          console.log("Setting up infinite scroll loop for portfolio-categories-container...");

          const updateWidths = () => {
            const first = el.children[0];
            const second = el.children[1];
            if (!first || !second) return;
            const gap = second.getBoundingClientRect().left - first.getBoundingClientRect().right;
            const cardWidth = first.getBoundingClientRect().width;
            const itemWidth = cardWidth + (gap > 0 ? gap : 20);
            // 11 unique categories, so 1 set is 11 items
            const setWidth = itemWidth * 11;
            el.dataset.setWidth = setWidth;
          };

          updateWidths();

          const io = new ResizeObserver(() => {
            updateWidths();
          });
          io.observe(el);

          // Scroll to the start of the 3rd set (copy index 2 out of indices 0..4)
          setTimeout(() => {
            const sW = parseFloat(el.dataset.setWidth || "0");
            if (sW > 0) {
              el.scrollLeft = sW * 2;
            }
          }, 100);

          let scrollTimeout;
          const doInfiniteAdjustment = () => {
            const sW = parseFloat(el.dataset.setWidth || "0");
            if (sW <= 0) return;

            const leftBound = sW * 1.5;
            const rightBound = sW * 2.5;

            if (el.scrollLeft < leftBound) {
              el.scrollLeft += sW;
            } else if (el.scrollLeft > rightBound) {
              el.scrollLeft -= sW;
            }
          };

          el.addEventListener("scroll", () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(doInfiniteAdjustment, 150);
          }, { passive: true });

          if ('onscrollend' in window) {
            el.addEventListener("scrollend", doInfiniteAdjustment);
          }
        }

        // Fast poll to capture container
        const checkTimer = setInterval(() => {
          const el = document.getElementById("portfolio-categories-container");
          if (el && el.children.length >= 55) {
            clearInterval(checkTimer);
            initInfiniteScroll();
          }
        }, 50);

        // Fallback checks
        setInterval(() => {
          const el = document.getElementById("portfolio-categories-container");
          if (el && el.children.length >= 55 && el.dataset.infiniteInitialized !== "true") {
            initInfiniteScroll();
          }
        }, 1000);
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-CbV5ml0j-v6.js?v=22"></script>
  </body>
