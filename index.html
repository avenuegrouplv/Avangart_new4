  <body class="bg-white text-zinc-900 font-sans antialiased">
    <div id="root"></div>
    <script type="text/javascript">
      // Global smooth scroll helper with custom duration and easing
      function smoothScrollTo(element, target, duration) {
        const start = element.scrollLeft;
        const change = target - start;
        const startTime = performance.now();
        
        function animateScroll(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          // Ease-out cubic: slower deceleration, extremely pleasing
          const ease = 1 - Math.pow(1 - progress, 3);
          
          element.scrollLeft = start + change * ease;
          
          if (progress < 1) {
            window.requestAnimationFrame(animateScroll);
          }
        }
        
        window.requestAnimationFrame(animateScroll);
      }

      // Global navigation functions for precise step-by-step scrolling
      window.scrollPortfolioPrev = function() {
        const el = document.getElementById("portfolio-categories-container");
        if (!el || !el.children.length) return;
        const card = el.children[0];
        const cardWidth = card.getBoundingClientRect().width;
        const style = window.getComputedStyle(el);
        const gap = parseFloat(style.gap) || 36;
        const itemWidth = cardWidth + gap;
        const currentScroll = el.scrollLeft;
        const targetScroll = Math.round(currentScroll / itemWidth) * itemWidth - itemWidth;
        smoothScrollTo(el, targetScroll, 800);
      };

      window.scrollPortfolioNext = function() {
        const el = document.getElementById("portfolio-categories-container");
        if (!el || !el.children.length) return;
        const card = el.children[0];
        const cardWidth = card.getBoundingClientRect().width;
        const style = window.getComputedStyle(el);
        const gap = parseFloat(style.gap) || 36;
        const itemWidth = cardWidth + gap;
        const currentScroll = el.scrollLeft;
        const targetScroll = Math.round(currentScroll / itemWidth) * itemWidth + itemWidth;
        smoothScrollTo(el, targetScroll, 800);
      };

      // Run the initial local storage sanitation check to clear stale cache
      try {
        const currentVersion = "avangart-projects-list-v23";
        const orderKey = "avangart-placeholders-order";
        
        // Remove old caches so that the app loads the correct configuration
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (key && (key.startsWith("avangart-projects-list-") && key !== currentVersion)) {
            console.warn("Purging outdated local storage key:", key);
            localStorage.removeItem(key);
            localStorage.removeItem(orderKey);
          }
        }
      } catch (e) {
        console.error(e);
      }

      // Infinite scroll loop logic for categories
      (function() {
        let isInitialized = false;

        function initInfiniteScroll() {
          const el = document.getElementById("portfolio-categories-container");
          if (!el || el.children.length < 55) return;

          if (el.dataset.infiniteInitialized === "true") return;
          el.dataset.infiniteInitialized = "true";

          console.log("Setting up infinite scroll loop for portfolio-categories-container...");

          const updateWidths = () => {
            const first = el.children[0];
            const second = el.children[1];
            if (!first || !second) return;
            const gap = second.getBoundingClientRect().left - first.getBoundingClientRect().right;
            const cardWidth = first.getBoundingClientRect().width;
            const itemWidth = cardWidth + (gap > 0 ? gap : 20);
            // 11 unique categories, so 1 set is 11 items
            const setWidth = itemWidth * 11;
            el.dataset.setWidth = setWidth;
          };

          updateWidths();

          const io = new ResizeObserver(() => {
            updateWidths();
          });
          io.observe(el);

          // Scroll to the start of the 3rd set (copy index 2 out of indices 0..4)
          setTimeout(() => {
            const sW = parseFloat(el.dataset.setWidth || "0");
            if (sW > 0) {
              el.scrollLeft = sW * 2;
            }
          }, 100);

          let scrollTimeout;
          const doInfiniteAdjustment = () => {
            const sW = parseFloat(el.dataset.setWidth || "0");
            if (sW <= 0) return;

            const leftBound = sW * 1.5;
            const rightBound = sW * 2.5;

            if (el.scrollLeft < leftBound) {
              el.scrollLeft += sW;
            } else if (el.scrollLeft > rightBound) {
              el.scrollLeft -= sW;
            }
          };

          const updateActiveScale = () => {
            const rect = el.getBoundingClientRect();
            const containerCenter = rect.left + rect.width / 2;
            const cards = el.querySelectorAll(".category-carousel-card");
            cards.forEach(card => {
              const cardRect = card.getBoundingClientRect();
              const cardCenter = cardRect.left + cardRect.width / 2;
              const distance = Math.abs(containerCenter - cardCenter);
              if (distance < cardRect.width * 0.6) {
                card.classList.add("active-card");
              } else {
                card.classList.remove("active-card");
              }
            });
          };

          el.addEventListener("scroll", () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(doInfiniteAdjustment, 150);
            window.requestAnimationFrame(updateActiveScale);
          }, { passive: true });

          if ('onscrollend' in window) {
            el.addEventListener("scrollend", () => {
              doInfiniteAdjustment();
              updateActiveScale();
            });
          }

          // Initial check and resize listeners
          updateActiveScale();
          window.addEventListener("resize", updateActiveScale);
          setInterval(updateActiveScale, 1000);
        }

        // Fast poll to capture container
        const checkTimer = setInterval(() => {
          const el = document.getElementById("portfolio-categories-container");
          if (el && el.children.length >= 55) {
            clearInterval(checkTimer);
            initInfiniteScroll();
          }
        }, 50);

        // Fallback checks
        setInterval(() => {
          const el = document.getElementById("portfolio-categories-container");
          if (el && el.children.length >= 55 && el.dataset.infiniteInitialized !== "true") {
            initInfiniteScroll();
          }
        }, 1000);
      })();
    </script>
